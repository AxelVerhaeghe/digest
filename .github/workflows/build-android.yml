name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name for the build (e.g. 1.0.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Resolve build version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version_name=${{ github.event.inputs.version_name }}" >> "$GITHUB_OUTPUT"
            echo "label=${{ github.event.inputs.version_name }}" >> "$GITHUB_OUTPUT"
          else
            short_sha="$(git rev-parse --short HEAD)"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "version_name=dev-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "label=dev-${short_sha}" >> "$GITHUB_OUTPUT"
          fi

          echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Inject Android version metadata
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const buildGradlePath = 'android/app/build.gradle';
          const buildGradle = fs.readFileSync(buildGradlePath, 'utf8');
          const updatedBuildGradle = buildGradle
            .replace(/versionCode\s+\d+/, 'versionCode ${{ steps.version.outputs.version_code }}')
            .replace(/versionName\s+"[^"]+"/, 'versionName "${{ steps.version.outputs.version_name }}"');

          if (updatedBuildGradle === buildGradle) {
            throw new Error('Failed to inject Android version metadata into android/app/build.gradle');
          }

          fs.writeFileSync(buildGradlePath, updatedBuildGradle);
          EOF

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ steps.version.outputs.label }}.apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Rename APK
        if: steps.version.outputs.is_release == 'true'
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
            android/app/build/outputs/apk/release/digest-v${{ steps.version.outputs.label }}.apk

      - name: Create GitHub Release
        if: steps.version.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.label }}" \
            --target "${{ github.sha }}" \
            --title "v${{ steps.version.outputs.label }}" \
            --generate-notes \
            android/app/build/outputs/apk/release/digest-v${{ steps.version.outputs.label }}.apk
